<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>PHONG-TUS | CYBER KEY SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', 'Courier New', monospace;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* === CYBER BACKGROUND === */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        /* Main gradient background */
        .cyber-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #050508);
            z-index: 0;
        }
        
        /* Grid overlay */
        .cyber-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }
        
        /* Noise texture */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.08;
            pointer-events: none;
            z-index: 2;
        }
        
        /* Scanline effect */
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(0, 255, 255, 0.02) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            animation: scanMove 8s linear infinite;
        }
        
        @keyframes scanMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        /* Glitch flicker */
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            95% { opacity: 0.3; }
            96% { opacity: 0.8; }
            97% { opacity: 0.2; }
            98% { opacity: 0.9; }
            99% { opacity: 0.4; }
        }
        
        /* === MAIN CONTAINER === */
        .cyber-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }
        
        /* === CARD DESIGN === */
        .cyber-card {
            background: rgba(8, 8, 16, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            padding: 32px 28px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.08);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
            overflow: hidden;
        }
        
        .cyber-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.05), transparent);
            transition: left 0.6s;
            z-index: 0;
        }
        
        .cyber-card:hover::before {
            left: 100%;
        }
        
        .cyber-card:hover {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.2);
            transform: translateY(-3px);
        }
        
        /* === GLOW BORDER ANIMATION === */
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 255, 255, 0.3); box-shadow: 0 0 10px rgba(0, 255, 255, 0.1); }
            50% { border-color: rgba(0, 255, 255, 0.8); box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); }
        }
        
        /* === HEADER === */
        .cyber-header {
            text-align: center;
            margin-bottom: 28px;
            position: relative;
        }
        
        .glitch-text {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #8a2be2, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            position: relative;
            animation: flicker 3s infinite;
        }
        
        .glitch-text::before,
        .glitch-text::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #00ffff, #8a2be2, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .glitch-text::before {
            animation: glitch-offset 0.3s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
            transform: translate(-2px, -1px);
            opacity: 0.8;
        }
        
        .glitch-text::after {
            animation: glitch-offset 0.3s infinite reverse;
            clip-path: polygon(0 80%, 100% 20%, 100% 100%, 0 100%);
            transform: translate(2px, 1px);
            opacity: 0.8;
        }
        
        @keyframes glitch-offset {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-1px, -1px); }
            60% { transform: translate(1px, 0); }
            80% { transform: translate(0, 1px); }
            100% { transform: translate(0); }
        }
        
        .subtitle {
            font-size: 11px;
            color: #00ffff;
            opacity: 0.6;
            letter-spacing: 2px;
            margin-top: 8px;
            font-weight: 400;
        }
        
        /* === KEY DISPLAY CARD === */
        .key-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .key-label {
            font-size: 10px;
            color: #8a2be2;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .key-value {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ffff;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            transition: all 0.3s;
            animation: borderPulse 2s infinite;
        }
        
        .key-value:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }
        
        /* === STATUS BADGE === */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 6px 16px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 10px;
            color: #00ffff;
            font-weight: 500;
            letter-spacing: 1px;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulseDot 1.5s infinite;
        }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); background: #00ffff; }
        }
        
        /* === BUTTONS === */
        .button-group {
            display: flex;
            gap: 16px;
            margin: 24px 0 20px;
            flex-wrap: wrap;
        }
        
        .cyber-btn {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(138, 43, 226, 0.15));
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 12px;
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(0, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.5s, height 0.5s;
        }
        
        .cyber-btn:hover::before {
            width: 200%;
            height: 200%;
        }
        
        .cyber-btn:hover {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        
        .cyber-btn:active {
            transform: translateY(0);
        }
        
        .btn-copy {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 150, 200, 0.25));
            border-color: #00ffff;
        }
        
        .btn-music {
            background: linear-gradient(135deg, rgba(255, 0, 255, 0.15), rgba(138, 43, 226, 0.25));
            border-color: #ff00ff;
        }
        
        .btn-music:hover {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }
        
        /* Copy success animation */
        @keyframes copyFlash {
            0% { transform: scale(1); background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 150, 200, 0.25)); }
            50% { transform: scale(0.98); background: linear-gradient(135deg, #00ff00, #00aa88); box-shadow: 0 0 30px #00ff00; }
            100% { transform: scale(1); background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 150, 200, 0.25)); }
        }
        
        .copy-flash {
            animation: copyFlash 0.4s ease;
        }
        
        /* === INFO CARD === */
        .info-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            border-left: 3px solid #00ffff;
        }
        
        .info-line {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            padding: 6px 0;
            font-family: monospace;
        }
        
        .info-label {
            color: #8a2be2;
            letter-spacing: 1px;
        }
        
        .info-value {
            color: #00ffff;
            font-weight: 500;
        }
        
        /* === FOOTER === */
        .cyber-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 9px;
            color: rgba(0, 255, 255, 0.3);
            letter-spacing: 1.5px;
        }
        
        .cyber-footer a {
            color: rgba(0, 255, 255, 0.5);
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .cyber-footer a:hover {
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }
        
        /* === SNOW EFFECT (Cyber version) === */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }
        
        .cyber-snow {
            position: absolute;
            top: -10px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00ffff, #8a2be2);
            opacity: 0.4;
            pointer-events: none;
            animation: fall linear infinite;
            filter: blur(1px);
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
            }
        }
        
        .snow-toggle {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 9px;
            color: #00ffff;
            cursor: pointer;
            z-index: 100;
            font-family: 'Orbitron', monospace;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        
        .snow-toggle:hover {
            border-color: #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }
        
        /* === LOADING ANIMATION === */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        
        .loader {
            text-align: center;
        }
        
        .loader-text {
            color: #00ffff;
            font-size: 14px;
            letter-spacing: 3px;
            margin-top: 20px;
            animation: blink 1s infinite;
        }
        
        .loader-spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-top: 2px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* === RESPONSIVE === */
        @media (max-width: 550px) {
            .cyber-card {
                padding: 24px 18px;
            }
            
            .glitch-text {
                font-size: 24px;
            }
            
            .key-value {
                font-size: 12px;
                padding: 12px;
            }
            
            .cyber-btn {
                padding: 12px 16px;
                font-size: 11px;
            }
            
            .button-group {
                gap: 12px;
            }
        }
        
        /* Music playing animation */
        .music-playing {
            animation: musicPulse 1s infinite;
        }
        
        @keyframes musicPulse {
            0%, 100% { border-color: #ff00ff; box-shadow: 0 0 5px rgba(255, 0, 255, 0.3); }
            50% { border-color: #00ffff; box-shadow: 0 0 20px rgba(255, 0, 255, 0.6); }
        }
        
        #player {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Cyber Background Layers -->
    <div class="cyber-bg"></div>
    <div class="noise-overlay"></div>
    <div class="scanline"></div>
    
    <!-- Snow Container -->
    <div class="snow-container" id="snowContainer"></div>
    
    <!-- Snow Toggle -->
    <div class="snow-toggle" id="snowToggle">❄️ SNOW</div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-spinner"></div>
            <div class="loader-text">INITIALIZING SECURE SYSTEM...</div>
        </div>
    </div>
    
    <!-- Hidden YouTube Player -->
    <div id="player"></div>
    
    <!-- Main Content -->
    <div class="cyber-container">
        <div class="cyber-card">
            <div class="cyber-header">
                <div class="glitch-text" data-text="PHONG-TUS">PHONG-TUS</div>
                <div class="subtitle">[ CYBER KEY DISTRIBUTION SYSTEM ]</div>
            </div>
            
            <div class="key-card">
                <div class="key-label">┌─ ACCESS KEY ─┐</div>
                <input type="text" id="keyInput" class="key-value" readonly />
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="statusText">SECURE CONNECTION ACTIVE</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="copyButton" class="cyber-btn btn-copy">📋 COPY KEY</button>
                <button id="musicButton" class="cyber-btn btn-music">🎵 ACTIVATE AUDIO</button>
            </div>
            
            <div class="info-card">
                <div class="info-line">
                    <span class="info-label">[ SYSTEM STATUS ]</span>
                    <span class="info-value" id="systemStatus">ONLINE</span>
                </div>
                <div class="info-line">
                    <span class="info-label">[ ENCRYPTION ]</span>
                    <span class="info-value">AES-256 / PHONG-TUS v3.0</span>
                </div>
                <div class="info-line">
                    <span class="info-label">[ TIME STAMP ]</span>
                    <span class="info-value" id="timestamp">--:--:--</span>
                </div>
                <div class="info-line">
                    <span class="info-label">[ SESSION ID ]</span>
                    <span class="info-value" id="sessionId">****-****</span>
                </div>
            </div>
            
            <div class="cyber-footer">
                <span>© PHONG-TUS SECURE SYSTEM</span> | 
                <a href="https://t.me/se_meo_bao_an" target="_blank">[ TELEGRAM NODE ]</a> | 
                <span id="dateDisplay"></span>
            </div>
        </div>
    </div>
    
    <script>
    /* ===== PHONG-TUS CYBER KEY SYSTEM v4.0 =====
       - UI HOÀN TOÀN MỚI: HACKER MA ÁM / CYBER DARK
       - CHỈ TẠO KEY 1 LẦN, CHẶN F5/RELOAD
       - COPY KEY → AUTO PLAY MUSIC
       - HIỆU ỨNG CYBER SNOW
    ============================================*/
    
    (function() {
        const PREFIX = "PHONG-TUS-";
        const RANDOM_LEN = 12;
        const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        
        // === LOADING SCREEN ===
        const loadingOverlay = document.getElementById('loadingOverlay');
        function showLoading(show) {
            if (show) {
                loadingOverlay.classList.add('active');
            } else {
                loadingOverlay.classList.remove('active');
            }
        }
        
        showLoading(true);
        setTimeout(() => showLoading(false), 1500);
        
        // === CYBER SNOW EFFECT ===
        let snowEnabled = true;
        
        function createCyberSnowflake() {
            const snow = document.createElement('div');
            snow.classList.add('cyber-snow');
            
            const size = Math.random() * 4 + 1.5;
            snow.style.width = `${size}px`;
            snow.style.height = `${size}px`;
            snow.style.left = `${Math.random() * 100}%`;
            snow.style.animationDuration = `${Math.random() * 6 + 3}s`;
            snow.style.animationDelay = `${Math.random() * 5}s`;
            snow.style.opacity = Math.random() * 0.5 + 0.2;
            
            return snow;
        }
        
        function initSnow() {
            const container = document.getElementById('snowContainer');
            if (!container) return;
            container.innerHTML = '';
            
            const count = window.innerWidth < 768 ? 80 : 150;
            for (let i = 0; i < count; i++) {
                container.appendChild(createCyberSnowflake());
            }
        }
        
        function removeSnow() {
            const container = document.getElementById('snowContainer');
            if (container) container.innerHTML = '';
        }
        
        function toggleSnow() {
            snowEnabled = !snowEnabled;
            const toggleBtn = document.getElementById('snowToggle');
            if (snowEnabled) {
                initSnow();
                toggleBtn.innerHTML = '❄️ SNOW';
                toggleBtn.style.opacity = '1';
            } else {
                removeSnow();
                toggleBtn.innerHTML = '❄️ SNOW OFF';
                toggleBtn.style.opacity = '0.5';
            }
        }
        
        // === KEY MANAGEMENT ===
        let storedKey = null;
        
        try {
            storedKey = sessionStorage.getItem('phongtus_key');
            if (!storedKey) storedKey = localStorage.getItem('phongtus_key');
        } catch(e) {}
        
        function generateRandomKey() {
            let randomPart = "";
            for (let i = 0; i < RANDOM_LEN; i++) {
                randomPart += CHARS.charAt(Math.floor(Math.random() * CHARS.length));
            }
            return PREFIX + randomPart;
        }
        
        function loadUsedKeys() {
            try {
                const raw = localStorage.getItem("phongtus_used_keys");
                return raw ? JSON.parse(raw) : [];
            } catch(e) { return []; }
        }
        
        function saveUsedKeys(keys) {
            try { localStorage.setItem("phongtus_used_keys", JSON.stringify(keys)); } catch(e) {}
        }
        
        function isKeyUsed(key) {
            return loadUsedKeys().includes(key);
        }
        
        function markKeyAsUsed(key) {
            if (!key) return;
            const used = loadUsedKeys();
            if (!used.includes(key)) {
                used.push(key);
                saveUsedKeys(used);
            }
        }
        
        function generateNewKey() {
            let newKey;
            let attempts = 0;
            do {
                newKey = generateRandomKey();
                attempts++;
                if (attempts > 100) break;
            } while (isKeyUsed(newKey));
            markKeyAsUsed(newKey);
            return newKey;
        }
        
        let finalKey;
        
        if (storedKey && storedKey.startsWith(PREFIX) && storedKey.length === (PREFIX.length + RANDOM_LEN)) {
            finalKey = storedKey;
        } else {
            finalKey = generateNewKey();
            try {
                sessionStorage.setItem('phongtus_key', finalKey);
                localStorage.setItem('phongtus_key', finalKey);
            } catch(e) {}
        }
        
        // Update URL
        try {
            const url = new URL(window.location.href);
            if (url.searchParams.get('ma') !== finalKey) {
                url.searchParams.set('ma', finalKey);
                window.history.replaceState({}, '', url);
            }
        } catch(e) {}
        
        // Display key
        const keyInput = document.getElementById('keyInput');
        if (keyInput) keyInput.value = finalKey;
        
        // Session ID display
        const sessionSpan = document.getElementById('sessionId');
        if (sessionSpan) {
            const shortId = finalKey.slice(-8);
            sessionSpan.textContent = `${shortId.slice(0,4)}-${shortId.slice(4,8)}`;
        }
        
        // === BLOCK F5/RELOAD ===
        window.addEventListener('beforeunload', function(e) {
            if (finalKey) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F5' || (e.ctrlKey && e.key === 'r') || 
                (e.ctrlKey && e.shiftKey && e.key === 'R') || (e.ctrlKey && e.key === 'F5')) {
                e.preventDefault();
                showToast('⛔ ACCESS DENIED: Key already generated', 'warning');
                return false;
            }
        });
        
        // === TOAST NOTIFICATION ===
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '80px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.padding = '12px 24px';
            toast.style.background = type === 'warning' ? 'rgba(255, 0, 0, 0.9)' : 'rgba(0, 255, 255, 0.9)';
            toast.style.color = '#000';
            toast.style.fontWeight = 'bold';
            toast.style.borderRadius = '8px';
            toast.style.fontFamily = 'Orbitron, monospace';
            toast.style.zIndex = '9999';
            toast.style.backdropFilter = 'blur(5px)';
            toast.style.border = '1px solid #fff';
            toast.style.fontSize = '11px';
            toast.style.letterSpacing = '1px';
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.5s';
                setTimeout(() => toast.remove(), 500);
            }, 2500);
        }
        
        // === YOUTUBE MUSIC ===
        let musicPlayed = false;
        let ytPlayer = null;
        let ytReady = false;
        let isPlaying = false;
        const YT_VIDEO_ID = 'UKox4YEvLpg';
        
        function initYouTube() {
            if (typeof YT !== 'undefined' && YT.loaded) {
                createPlayer();
                return;
            }
            if (!document.getElementById('yt-api-script')) {
                const tag = document.createElement('script');
                tag.id = 'yt-api-script';
                tag.src = 'https://www.youtube.com/iframe_api';
                document.head.appendChild(tag);
            }
            window.onYouTubeIframeAPIReady = function() {
                createPlayer();
            };
        }
        
        function createPlayer() {
            if (ytPlayer) return;
            ytPlayer = new YT.Player('player', {
                height: '0',
                width: '0',
                videoId: YT_VIDEO_ID,
                playerVars: { autoplay: 0, controls: 0, modestbranding: 1, playsinline: 1 },
                events: {
                    onReady: function() {
                        ytReady = true;
                        try { ytPlayer.setVolume(40); } catch(e) {}
                    },
                    onStateChange: function(event) {
                        if (event.data === 1) {
                            isPlaying = true;
                            const musicBtn = document.getElementById('musicButton');
                            if (musicBtn) {
                                musicBtn.innerHTML = '⏸️ AUDIO ACTIVE';
                                musicBtn.classList.add('music-playing');
                            }
                        } else if (event.data === 2) {
                            isPlaying = false;
                            const musicBtn = document.getElementById('musicButton');
                            if (musicBtn) {
                                musicBtn.innerHTML = '🎵 ACTIVATE AUDIO';
                                musicBtn.classList.remove('music-playing');
                            }
                        }
                    }
                }
            });
        }
        
        function playMusic() {
            if (!ytReady && !ytPlayer) {
                initYouTube();
                setTimeout(() => { if (ytReady && ytPlayer) { ytPlayer.playVideo(); isPlaying = true; } }, 1000);
            } else if (ytPlayer && ytReady) {
                ytPlayer.playVideo();
                isPlaying = true;
            }
        }
        
        function pauseMusic() {
            if (ytPlayer && ytReady) ytPlayer.pauseVideo();
        }
        
        function toggleMusic() {
            if (!ytReady && !ytPlayer) {
                initYouTube();
                setTimeout(() => playMusic(), 500);
            } else if (isPlaying) {
                pauseMusic();
            } else {
                playMusic();
            }
        }
        
        // === COPY KEY FUNCTION ===
        async function copyKey() {
            if (!finalKey) return;
            
            const copyBtn = document.getElementById('copyButton');
            copyBtn.classList.add('copy-flash');
            setTimeout(() => copyBtn.classList.remove('copy-flash'), 400);
            
            try {
                await navigator.clipboard.writeText(finalKey);
                showToast('✓ KEY COPIED: ' + finalKey, 'success');
            } catch(e) {
                const textarea = document.createElement('textarea');
                textarea.value = finalKey;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✓ KEY COPIED: ' + finalKey, 'success');
            }
            
            if (!musicPlayed) {
                musicPlayed = true;
                playMusic();
                const musicBtn = document.getElementById('musicButton');
                if (musicBtn) {
                    musicBtn.innerHTML = '⏸️ AUDIO ACTIVE';
                    musicBtn.classList.add('music-playing');
                }
                showToast('🎵 AUDIO SIGNAL ACTIVATED', 'info');
            } else if (!isPlaying) {
                playMusic();
            }
        }
        
        // === TIME DISPLAY ===
        function updateTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            const d = now.getDate();
            const m = now.getMonth() + 1;
            const y = now.getFullYear();
            
            const timestampSpan = document.getElementById('timestamp');
            if (timestampSpan) timestampSpan.textContent = `${hh}:${mm}:${ss}`;
            
            const dateSpan = document.getElementById('dateDisplay');
            if (dateSpan) dateSpan.textContent = `${d}/${m}/${y}`;
            
            setTimeout(updateTime, 1000);
        }
        
        // === EVENT LISTENERS ===
        const copyBtn = document.getElementById('copyButton');
        if (copyBtn) copyBtn.addEventListener('click', copyKey);
        
        const musicBtn = document.getElementById('musicButton');
        if (musicBtn) musicBtn.addEventListener('click', toggleMusic);
        
        const snowToggle = document.getElementById('snowToggle');
        if (snowToggle) snowToggle.addEventListener('click', toggleSnow);
        
        // === INITIALIZATION ===
        window.addEventListener('load', function() {
            updateTime();
            initYouTube();
            initSnow();
            
            console.log('🔐 PHONG-TUS CYBER SYSTEM v4.0 ACTIVE');
            console.log('📡 KEY:', finalKey);
            console.log('❄️ CYBER SNOW: ENABLED');
            console.log('⚠️ F5/RELOAD BLOCKED');
        });
        
        // Remove any random key buttons
        const randomButtons = document.querySelectorAll('[onclick*="random"], [onclick*="generate"]');
        randomButtons.forEach(btn => btn.remove());
        
        // Resize handler for snow
        let resizeTimeout;
        window.addEventListener('resize', function() {
            if (snowEnabled) {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => initSnow(), 500);
            }
        });
        
    })();
    </script>
</body>
