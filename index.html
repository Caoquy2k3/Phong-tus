<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KeyMarket Pro - Đăng nhập Google & Bán Key</title>
    <!-- Google Identity Services SDK -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0a0f2a 0%, #0b1525 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .app-container {
            max-width: 1400px;
            width: 100%;
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
            overflow: hidden;
            transition: all 0.3s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            background: rgba(0, 0, 0, 0.4);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h2 {
            background: linear-gradient(135deg, #A855F7, #3B82F6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo p {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 18px;
            background: rgba(255,255,255,0.05);
            padding: 6px 18px;
            border-radius: 60px;
            flex-wrap: wrap;
        }

        .user-greeting {
            color: #e2e8f0;
            font-weight: 500;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #8b5cf6;
        }

        .badge-role {
            font-size: 0.7rem;
            background: #3b82f6;
            padding: 4px 12px;
            border-radius: 30px;
            color: white;
        }

        .badge-role.admin {
            background: #f97316;
        }

        button {
            background: linear-gradient(95deg, #3b82f6, #8b5cf6);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        button.outline {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #93c5fd;
        }

        button.outline:hover {
            background: #3b82f620;
            color: white;
        }

        button.google-btn {
            background: white;
            color: #1f2937;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: none;
        }

        button.google-btn:hover {
            background: #f3f4f6;
        }

        button.danger {
            background: linear-gradient(95deg, #ef4444, #b91c1c);
        }

        button:active {
            transform: scale(0.97);
        }

        .dashboard {
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            padding: 28px;
        }

        .sidebar {
            flex: 1.2;
            min-width: 260px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.5rem;
            padding: 20px;
            backdrop-filter: blur(4px);
            height: fit-content;
        }

        .main-content {
            flex: 3;
            min-width: 280px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 1.2rem;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.2s;
        }

        .card h3 {
            color: #cbd5e6;
            margin-bottom: 18px;
            font-weight: 600;
            border-left: 4px solid #8b5cf6;
            padding-left: 14px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        input, select, textarea {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 1rem;
            color: #f1f5f9;
            font-size: 0.9rem;
            width: 100%;
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 2px #8b5cf640;
        }

        .key-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .key-item {
            background: #0f172a80;
            margin: 8px 0;
            padding: 12px;
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid #3b82f6;
            font-family: monospace;
            font-size: 0.8rem;
            word-break: break-all;
            flex-wrap: wrap;
            gap: 8px;
        }

        .key-code {
            font-weight: bold;
            color: #a5f3c3;
        }

        .badge {
            font-size: 0.7rem;
            background: #1e293b;
            padding: 4px 10px;
            border-radius: 30px;
        }

        .stats-grid {
            display: flex;
            gap: 18px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .stat-box {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            padding: 12px 18px;
            border-radius: 1rem;
            flex: 1;
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #a78bfa;
        }

        .admin-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .toast-message {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            z-index: 2000;
            font-weight: 500;
            animation: fadeUp 0.3s ease;
            border-left: 4px solid #10b981;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @keyframes fadeUp {
            from { opacity: 0; bottom: 0; }
            to { opacity: 1; bottom: 24px; }
        }

        .empty-msg {
            color: #6c7a91;
            text-align: center;
            padding: 20px;
        }

        hr {
            border-color: #334155;
            margin: 16px 0;
        }

        footer {
            text-align: center;
            padding: 16px;
            font-size: 0.7rem;
            color: #5b6e8c;
            border-top: 1px solid #1e2a3a;
        }

        .auth-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
        }

        .auth-tab {
            padding: 8px 20px;
            cursor: pointer;
            background: transparent;
            color: #94a3b8;
            border-radius: 30px;
        }

        .auth-tab.active {
            background: #3b82f6;
            color: white;
        }

        .google-section {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 1rem;
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: #64748b;
            font-size: 0.8rem;
            margin: 16px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #334155;
        }

        .divider span {
            padding: 0 12px;
        }

        @media (max-width: 780px) {
            .dashboard {
                flex-direction: column;
            }
            .header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="header">
        <div class="logo">
            <h2>🔑 KeyMarket Pro</h2>
            <p>Bán Key · Đăng nhập Google · Tự động đăng ký</p>
        </div>
        <div class="user-area" id="userAreaHeader"></div>
    </div>

    <div class="dashboard" id="dynamicDashboard"></div>
    <footer>© 2025 KeyMarket - Hệ thống quản lý key | Admin: admin / admin123 | Đăng nhập bằng Google hoặc đăng ký nhanh</footer>
</div>

<script>
    // ==================== STORAGE KEYS ====================
    const STORAGE_USERS = "keymarket_users";
    const STORAGE_KEYS = "keymarket_keys";
    const STORAGE_SESSION = "keymarket_session";
    const GOOGLE_CLIENT_ID = "1080625618912-qqjb6nebpcpnvsehrhjbgc0eqbh2dpqk.apps.googleusercontent.com"; // Google Client ID mẫu (có thể thay bằng ID thật của bạn)

    // ==================== INIT DATA ====================
    function initData() {
        if (!localStorage.getItem(STORAGE_USERS)) {
            const defaultUsers = [
                { id: "u1", username: "admin", password: "admin123", role: "admin", fullname: "Quản trị viên", email: "admin@keymarket.com", avatar: null, provider: "local" },
                { id: "u2", username: "khach1", password: "123456", role: "user", fullname: "Nguyễn Văn A", email: "khach1@email.com", avatar: null, provider: "local" }
            ];
            localStorage.setItem(STORAGE_USERS, JSON.stringify(defaultUsers));
        }
        if (!localStorage.getItem(STORAGE_KEYS)) {
            const defaultKeys = [
                { id: "k1", code: "PRO-9F8D-3A2C-1B7E", status: "active", createdBy: "admin", createdAt: new Date().toISOString(), soldTo: null, price: 199000 },
                { id: "k2", code: "GAME-X7K9-4M2N-6V3C", status: "active", createdBy: "admin", createdAt: new Date().toISOString(), soldTo: null, price: 299000 },
                { id: "k3", code: "VIP-5H6J-8K2L-0Q9W", status: "active", createdBy: "admin", createdAt: new Date().toISOString(), soldTo: null, price: 499000 }
            ];
            localStorage.setItem(STORAGE_KEYS, JSON.stringify(defaultKeys));
        }
    }
    initData();

    // ==================== HELPERS ====================
    function getUsers() { return JSON.parse(localStorage.getItem(STORAGE_USERS)) || []; }
    function saveUsers(users) { localStorage.setItem(STORAGE_USERS, JSON.stringify(users)); }
    function getKeys() { return JSON.parse(localStorage.getItem(STORAGE_KEYS)) || []; }
    function saveKeys(keys) { localStorage.setItem(STORAGE_KEYS, JSON.stringify(keys)); }

    // Session management
    function getSession() {
        const sess = localStorage.getItem(STORAGE_SESSION);
        if (!sess) return null;
        try {
            const data = JSON.parse(sess);
            if (data.expiry && Date.now() > data.expiry) {
                localStorage.removeItem(STORAGE_SESSION);
                return null;
            }
            return data.user;
        } catch(e) { return null; }
    }
    function setSession(user) {
        const sessionData = { user: user, expiry: Date.now() + (8 * 60 * 60 * 1000) };
        localStorage.setItem(STORAGE_SESSION, JSON.stringify(sessionData));
    }
    function logout() {
        localStorage.removeItem(STORAGE_SESSION);
        renderApp();
        showToast("👋 Đã đăng xuất!");
    }

    // ==================== AUTH: LOCAL + GOOGLE ====================
    function handleLoginLocal(username, password) {
        const users = getUsers();
        const user = users.find(u => u.username === username && u.password === password && u.provider === "local");
        if (user) {
            const { password, ...safeUser } = user;
            setSession(safeUser);
            renderApp();
            showToast(`👋 Chào mừng ${user.fullname || user.username} (${user.role === 'admin' ? 'Admin' : 'Người dùng'})`);
            return true;
        } else {
            showToast("❌ Sai tài khoản hoặc mật khẩu!", true);
            return false;
        }
    }

    // Tự động đăng ký (nếu chưa tồn tại)
    function autoRegisterAndLogin(userData) {
        const users = getUsers();
        const existing = users.find(u => u.email === userData.email || u.username === userData.email.split('@')[0]);
        
        if (existing) {
            // Đã tồn tại -> đăng nhập luôn
            const { password, ...safeUser } = existing;
            setSession(safeUser);
            renderApp();
            showToast(`👋 Chào mừng trở lại ${existing.fullname || existing.username}`);
            return true;
        } else {
            // Tự động đăng ký tài khoản mới
            const newUsername = userData.email.split('@')[0] + "_" + Math.floor(Math.random() * 1000);
            const newUser = {
                id: "u" + Date.now(),
                username: newUsername,
                password: null, // không cần password cho Google
                role: "user",
                fullname: userData.name,
                email: userData.email,
                avatar: userData.avatar,
                provider: "google",
                createdAt: new Date().toISOString()
            };
            users.push(newUser);
            saveUsers(users);
            const { password, ...safeUser } = newUser;
            setSession(safeUser);
            renderApp();
            showToast(`✅ Tự động đăng ký thành công! Chào mừng ${userData.name}`);
            return true;
        }
    }

    // Xử lý đăng nhập Google (callback từ Credential Response)
    function handleGoogleCredentialResponse(response) {
        // Giải mã token để lấy thông tin user (thực tế nên xác thực backend, ở đây demo giải mã client)
        try {
            const payload = parseJwt(response.credential);
            if (payload) {
                const userData = {
                    email: payload.email,
                    name: payload.name,
                    avatar: payload.picture,
                    email_verified: payload.email_verified
                };
                autoRegisterAndLogin(userData);
            } else {
                showToast("❌ Đăng nhập Google thất bại!", true);
            }
        } catch(e) {
            showToast("❌ Lỗi xác thực Google!", true);
        }
    }

    function parseJwt(token) {
        try {
            const base64Url = token.split('.')[1];
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch(e) { return null; }
    }

    // Đăng ký local
    function handleRegisterLocal(username, password, fullname) {
        const users = getUsers();
        if (users.find(u => u.username === username)) {
            showToast("⚠️ Tên đăng nhập đã tồn tại!", true);
            return false;
        }
        if (username.length < 3 || password.length < 3) {
            showToast("⚠️ Tên đăng nhập/mật khẩu tối thiểu 3 ký tự", true);
            return false;
        }
        const newUser = {
            id: "u" + Date.now(),
            username: username,
            password: password,
            role: "user",
            fullname: fullname || username,
            email: `${username}@local.com`,
            avatar: null,
            provider: "local",
            createdAt: new Date().toISOString()
        };
        users.push(newUser);
        saveUsers(users);
        const { password: _, ...safeUser } = newUser;
        setSession(safeUser);
        renderApp();
        showToast("✅ Đăng ký thành công! Bạn đã đăng nhập.");
        return true;
    }

    // ==================== QUẢN LÝ KEY ====================
    function addNewKey(code, price) {
        const sessionUser = getSession();
        if (!sessionUser || sessionUser.role !== 'admin') {
            showToast("⚠️ Chỉ admin mới được tạo key!", true);
            return false;
        }
        if (!code || code.trim() === "") {
            showToast("❌ Vui lòng nhập mã key", true);
            return false;
        }
        const keys = getKeys();
        if (keys.find(k => k.code === code.trim())) {
            showToast("❌ Mã key đã tồn tại!", true);
            return false;
        }
        const newKey = {
            id: "key_" + Date.now(),
            code: code.trim(),
            status: "active",
            createdBy: sessionUser.username,
            createdAt: new Date().toISOString(),
            soldTo: null,
            price: parseInt(price) || 0
        };
        keys.push(newKey);
        saveKeys(keys);
        showToast(`✅ Đã thêm key: ${code}`);
        renderApp();
        return true;
    }

    function deleteKey(keyId) {
        const sessionUser = getSession();
        if (!sessionUser || sessionUser.role !== 'admin') {
            showToast("⚠️ Không có quyền", true);
            return;
        }
        let keys = getKeys();
        const keyExists = keys.find(k => k.id === keyId);
        if (!keyExists) return;
        keys = keys.filter(k => k.id !== keyId);
        saveKeys(keys);
        showToast(`🗑️ Đã xóa key: ${keyExists.code}`);
        renderApp();
    }

    function purchaseKey(keyId) {
        const sessionUser = getSession();
        if (!sessionUser) {
            showToast("🔐 Vui lòng đăng nhập để mua key!", true);
            return;
        }
        if (sessionUser.role === 'admin') {
            showToast("👑 Admin không cần mua key!", true);
            return;
        }
        const keys = getKeys();
        const keyIndex = keys.findIndex(k => k.id === keyId && k.status === 'active' && !k.soldTo);
        if (keyIndex === -1) {
            showToast("❌ Key không khả dụng hoặc đã bán!", true);
            return;
        }
        const key = keys[keyIndex];
        key.status = "sold";
        key.soldTo = sessionUser.username;
        key.soldAt = new Date().toISOString();
        keys[keyIndex] = key;
        saveKeys(keys);
        showToast(`🎉 Mua thành công! Key: ${key.code}`);
        renderApp();
    }

    // ==================== RENDER UI ====================
    function renderAuthScreen() {
        return `
            <div style="max-width:550px; margin: 40px auto;">
                <div class="card" style="background: rgba(0,0,0,0.5);">
                    <div class="auth-tabs">
                        <div class="auth-tab active" data-tab="login">🔐 Đăng nhập</div>
                        <div class="auth-tab" data-tab="register">📝 Đăng ký</div>
                    </div>
                    
                    <div id="loginPanel">
                        <div class="input-group">
                            <input type="text" id="loginUsername" placeholder="Tên đăng nhập">
                            <input type="password" id="loginPassword" placeholder="Mật khẩu">
                            <button id="doLoginBtn">Đăng nhập</button>
                        </div>
                    </div>
                    
                    <div id="registerPanel" style="display:none;">
                        <div class="input-group" style="flex-direction:column;">
                            <input type="text" id="regUsername" placeholder="Tên đăng nhập *">
                            <input type="password" id="regPassword" placeholder="Mật khẩu *">
                            <input type="text" id="regFullname" placeholder="Họ tên (không bắt buộc)">
                            <button id="doRegisterBtn">Đăng ký ngay</button>
                        </div>
                    </div>
                    
                    <div class="divider"><span>Hoặc</span></div>
                    
                    <div class="google-section">
                        <div id="googleButtonContainer"></div>
                        <p style="font-size:12px; margin-top:12px; color:#94a3b8;">✨ Đăng nhập bằng Google - Tự động tạo tài khoản nếu chưa có</p>
                    </div>
                    
                    <div class="empty-msg" style="margin-top:12px;">👨‍💻 Tài khoản mẫu: admin / admin123 | khach1 / 123456</div>
                </div>
            </div>
        `;
    }

    function renderAdminDashboard(keys, user) {
        const availableKeys = keys.filter(k => k.status === 'active' && !k.soldTo);
        const soldKeys = keys.filter(k => k.soldTo !== null);
        return `
            <div class="sidebar">
                <div class="card">
                    <h3>👑 Admin Dashboard</h3>
                    <div class="stats-grid">
                        <div class="stat-box"><div class="stat-number">${keys.length}</div><div>Tổng Key</div></div>
                        <div class="stat-box"><div class="stat-number">${availableKeys.length}</div><div>Còn trống</div></div>
                        <div class="stat-box"><div class="stat-number">${soldKeys.length}</div><div>Đã bán</div></div>
                    </div>
                    <div class="admin-actions">
                        <button id="showCreateKeyBtn">➕ Tạo Key mới</button>
                        <button id="refreshDashboardBtn" class="outline">🔄 Làm mới</button>
                    </div>
                </div>
                <div class="card">
                    <h3>🔑 API cho tool</h3>
                    <p style="font-size:12px;">Token: <strong>ADMIN_KEY_2025</strong></p>
                    <button id="copyApiKeyBtn" style="padding:5px 12px;">📋 Copy Token</button>
                </div>
            </div>
            <div class="main-content">
                <div class="card">
                    <h3>📦 Quản lý Key</h3>
                    <div id="keyListContainer" class="key-list">
                        ${renderKeyList(keys, user)}
                    </div>
                </div>
            </div>
        `;
    }

    function renderUserDashboard(keys, user) {
        const unsoldKeys = keys.filter(k => k.status === 'active' && !k.soldTo);
        const myPurchasedKeys = keys.filter(k => k.soldTo === user.username);
        return `
            <div class="sidebar">
                <div class="card">
                    <h3>👤 Thông tin</h3>
                    ${user.avatar ? `<img src="${user.avatar}" class="user-avatar" style="margin-bottom:12px;">` : ''}
                    <p><strong>Username:</strong> ${user.username}</p>
                    <p><strong>Họ tên:</strong> ${user.fullname || '---'}</p>
                    <p><strong>Email:</strong> ${user.email || '---'}</p>
                    <p><strong>Đăng nhập qua:</strong> ${user.provider === 'google' ? 'Google' : 'Hệ thống'}</p>
                    <hr>
                    <p>🔑 Key đã mua: ${myPurchasedKeys.length}</p>
                    <button id="userRefreshBtn" class="outline">🔄 Làm mới</button>
                </div>
            </div>
            <div class="main-content">
                <div class="card">
                    <h3>🛒 Cửa hàng Key</h3>
                    <div id="availableKeysStore" class="key-list">
                        ${unsoldKeys.length === 0 ? '<div class="empty-msg">✨ Hiện chưa có key nào bán!</div>' : 
                            unsoldKeys.map(k => `
                                <div class="key-item">
                                    <div><span class="key-code">🔐 ${k.code}</span><br><span class="badge">💰 ${k.price?.toLocaleString()}đ</span></div>
                                    <button class="buy-key-btn" data-id="${k.id}">Mua ngay</button>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
                <div class="card">
                    <h3>📋 Key của tôi</h3>
                    <div id="myKeysList" class="key-list">
                        ${myPurchasedKeys.length === 0 ? '<div class="empty-msg">Bạn chưa mua key nào.</div>' :
                            myPurchasedKeys.map(k => `
                                <div class="key-item">
                                    <span class="key-code">${k.code}</span>
                                    <span class="badge">Mua: ${new Date(k.soldAt).toLocaleDateString()}</span>
                                </div>
                            `).join('')
                        }
                    </div>
                </div>
            </div>
        `;
    }

    function renderKeyList(keys, user) {
        if (keys.length === 0) return '<div class="empty-msg">Chưa có key nào</div>';
        return keys.map(k => {
            const statusText = k.soldTo ? `Đã bán cho ${k.soldTo}` : (k.status === 'active' ? 'Còn hàng' : 'Không hoạt động');
            return `
                <div class="key-item">
                    <div style="flex:2">
                        <div class="key-code">${k.code}</div>
                        <div style="font-size:10px;">💰 ${k.price?.toLocaleString()}đ | ${statusText}</div>
                    </div>
                    <div>
                        <button class="delete-key-btn" data-id="${k.id}" style="background:#ef4444; padding:6px 12px;">🗑️ Xóa</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function showCreateKeyModal() {
        const modalDiv = document.createElement('div');
        modalDiv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:3000;';
        modalDiv.innerHTML = `
            <div style="background:#0f172a; border-radius:28px; max-width:400px; width:90%; padding:28px;">
                <h3 style="color:white;">➕ Tạo key mới</h3>
                <input type="text" id="newKeyCode" placeholder="Mã key" style="margin:12px 0;">
                <input type="number" id="newKeyPrice" placeholder="Giá bán (VNĐ)" value="199000">
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button id="confirmCreateKeyBtn">Tạo ngay</button>
                    <button id="cancelModalBtn" class="outline">Hủy</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        modalDiv.querySelector('#confirmCreateKeyBtn').onclick = () => {
            const code = modalDiv.querySelector('#newKeyCode').value.trim();
            const price = modalDiv.querySelector('#newKeyPrice').value;
            if (code) { addNewKey(code, price); modalDiv.remove(); }
            else showToast("Nhập mã key", true);
        };
        modalDiv.querySelector('#cancelModalBtn').onclick = () => modalDiv.remove();
    }

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.style.background = isError ? '#991b1b' : '#1e293b';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    function copyApiToken() {
        navigator.clipboard.writeText("ADMIN_KEY_2025");
        showToast("✅ Đã copy API Token");
    }

    // ==================== RENDER CHÍNH ====================
    function renderApp() {
        const sessionUser = getSession();
        const dashboardDiv = document.getElementById('dynamicDashboard');
        const headerArea = document.getElementById('userAreaHeader');

        if (!sessionUser) {
            headerArea.innerHTML = `<span class="user-greeting">👋 Chưa đăng nhập</span>`;
            dashboardDiv.innerHTML = renderAuthScreen();
            
            // Khởi tạo Google Login
            setTimeout(() => {
                if (window.google && document.getElementById('googleButtonContainer')) {
                    window.google.accounts.id.initialize({
                        client_id: GOOGLE_CLIENT_ID,
                        callback: handleGoogleCredentialResponse
                    });
                    window.google.accounts.id.renderButton(
                        document.getElementById('googleButtonContainer'),
                        { theme: 'outline', size: 'large', width: '100%', text: 'continue_with' }
                    );
                } else {
                    const container = document.getElementById('googleButtonContainer');
                    if (container) container.innerHTML = '<button class="google-btn" onclick="alert(\'Vui lòng tải lại trang hoặc cấu hình Google Client ID\')">🔑 Đăng nhập Google (Demo)</button>';
                }
                
                // Tab switching
                const loginPanel = document.getElementById('loginPanel');
                const registerPanel = document.getElementById('registerPanel');
                const tabs = document.querySelectorAll('.auth-tab');
                tabs.forEach(tab => {
                    tab.onclick = () => {
                        tabs.forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        if (tab.innerText.includes('Đăng nhập')) {
                            loginPanel.style.display = 'block';
                            registerPanel.style.display = 'none';
                        } else {
                            loginPanel.style.display = 'none';
                            registerPanel.style.display = 'block';
                        }
                    };
                });
                
                document.getElementById('doLoginBtn')?.addEventListener('click', () => {
                    const user = document.getElementById('loginUsername').value;
                    const pwd = document.getElementById('loginPassword').value;
                    handleLoginLocal(user, pwd);
                });
                document.getElementById('doRegisterBtn')?.addEventListener('click', () => {
                    const user = document.getElementById('regUsername').value;
                    const pwd = document.getElementById('regPassword').value;
                    const full = document.getElementById('regFullname').value;
                    handleRegisterLocal(user, pwd, full);
                });
            }, 50);
            return;
        }

        // Đã đăng nhập
        const user = sessionUser;
        const allKeys = getKeys();
        headerArea.innerHTML = `
            ${user.avatar ? `<img src="${user.avatar}" class="user-avatar" onerror="this.style.display='none'">` : ''}
            <span class="user-greeting">👋 ${user.fullname || user.username}</span>
            <span class="badge-role ${user.role === 'admin' ? 'admin' : ''}">${user.role === 'admin' ? 'Admin' : 'Thành viên'}</span>
            <button id="logoutHeaderBtn" class="outline">🚪 Thoát</button>
        `;

        if (user.role === 'admin') {
            dashboardDiv.innerHTML = renderAdminDashboard(allKeys, user);
            setTimeout(() => {
                document.getElementById('showCreateKeyBtn')?.addEventListener('click', showCreateKeyModal);
                document.getElementById('refreshDashboardBtn')?.addEventListener('click', renderApp);
                document.getElementById('copyApiKeyBtn')?.addEventListener('click', copyApiToken);
                document.querySelectorAll('.delete-key-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        if (confirm('Xóa key vĩnh viễn?')) deleteKey(btn.getAttribute('data-id'));
                    });
                });
            }, 20);
        } else {
            dashboardDiv.innerHTML = renderUserDashboard(allKeys, user);
            setTimeout(() => {
                document.querySelectorAll('.buy-key-btn').forEach(btn => {
                    btn.addEventListener('click', () => purchaseKey(btn.getAttribute('data-id')));
                });
                document.getElementById('userRefreshBtn')?.addEventListener('click', renderApp);
            }, 20);
        }

        document.getElementById('logoutHeaderBtn')?.addEventListener('click', logout);
    }

    renderApp();
</script>
</body>
</html>
