<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>PHONG-TUS KEY GENERATOR | VIP TOOL</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', 'Segoe UI', 'Fira Code', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #0f0f1a 50%, #0a0a0f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Grid background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }
        
        /* Glow animation */
        @keyframes glowPulse {
            0% { box-shadow: 0 0 5px rgba(0, 255, 255, 0.3); border-color: rgba(0, 255, 255, 0.5); }
            50% { box-shadow: 0 0 25px rgba(0, 255, 255, 0.7); border-color: rgba(0, 255, 255, 0.9); }
            100% { box-shadow: 0 0 5px rgba(0, 255, 255, 0.3); border-color: rgba(0, 255, 255, 0.5); }
        }
        
        @keyframes neonFlicker {
            0%, 100% { text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff; }
            50% { text-shadow: 0 0 2px #00ffff, 0 0 5px #00ffff, 0 0 10px #00ffff; }
        }
        
        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .loading-container {
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px 30px;
            width: 90vw;
            max-width: 550px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.1);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        
        .loading-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #00ffff, #ff00ff, #00ffff, #ff00ff);
            background-size: 300% 300%;
            border-radius: 22px;
            z-index: -1;
            opacity: 0.3;
            animation: borderFlow 4s ease infinite;
        }
        
        h1 {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #00ffff, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            letter-spacing: 2px;
            animation: neonFlicker 2s infinite;
        }
        
        .key-label {
            font-size: 12px;
            color: #00ffff;
            opacity: 0.7;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .key-container {
            margin: 20px 0;
        }
        
        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00ffff;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            color: #00ffff;
            font-family: monospace;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            animation: glowPulse 2s infinite;
        }
        
        input:focus {
            outline: none;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #00aa88, #0066aa);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        #copyButton {
            background: linear-gradient(135deg, #00ffff, #0088aa);
        }
        
        #musicButton {
            background: linear-gradient(135deg, #ff00ff, #8800aa);
        }
        
        #dateDisplay {
            margin-top: 20px;
            font-size: 14px;
            color: #00ffff;
            opacity: 0.8;
            font-family: monospace;
        }
        
        .footer {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 255, 255, 0.2);
            font-size: 12px;
            color: #888;
        }
        
        .footer a {
            color: #00ffff;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .footer a:hover {
            text-shadow: 0 0 5px #00ffff;
        }
        
        #clock {
            color: #ff00ff;
            font-weight: bold;
        }
        
        /* Copy animation */
        @keyframes copyFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); background: linear-gradient(135deg, #00ff00, #00aa88); }
            100% { transform: scale(1); }
        }
        
        .copy-animation {
            animation: copyFlash 0.5s ease;
        }
        
        /* Music playing indicator */
        @keyframes musicBeat {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px #ff00ff; }
        }
        
        .music-playing {
            animation: musicBeat 1s infinite;
        }
        
        #player {
            display: none;
        }
        
        /* Status badge */
        .status-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            border-radius: 20px;
            font-size: 11px;
            color: #00ffff;
            font-family: monospace;
        }
        
        /* Random decoration */
        .corner-decoration {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(0, 255, 255, 0.2);
            font-size: 10px;
            font-family: monospace;
            z-index: 0;
        }
        
        .corner-decoration::before {
            content: '>_ PHONG-TUS SECURE';
        }
    </style>
</head>
<body>
    <div id="player"></div>
    
    <div class="loading-container">
        <h1>⚡ PHONG-TUS KEY ⚡</h1>
        <div class="key-label">┌─[VIP TOOL LICENSE]─┐</div>
        
        <div class="key-container">
            <input type="text" id="keyInput" readonly />
            <div class="status-badge" id="statusBadge">🔐 VALID</div>
            <div class="button-group">
                <button id="copyButton">📋 COPY KEY</button>
                <button id="musicButton">🎵 PLAY MUSIC</button>
            </div>
        </div>
        
        <div id="dateDisplay"></div>
        <div class="footer">
            <b>© PHONG-TUS SECURE SYSTEM</b><br>
            <a href="https://t.me/se_meo_bao_an" target="_blank">[ TELEGRAM ]</a> | 
            <span id="clock"></span>
        </div>
    </div>
    <div class="corner-decoration"></div>

<script>
/* ===== PHONG-TUS KEY SYSTEM v3.0 =====
   - KEY CHỈ TẠO 1 LẦN DUY NHẤT KHI VÀO TRANG
   - CHẶN F5, CHẶN RELOAD, CHẶN SPAM
   - AUTO GENERATE, KHÔNG CẦN NÚT
   - COPY KEY → TỰ ĐỘNG PLAY NHẠC
========================================*/

(function(){
    const PREFIX = "PHONG-TUS-";
    const RANDOM_LEN = 12; // 12 ký tự random
    const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    
    // === KIỂM TRA ĐÃ CÓ KEY TRONG SESSION/LOCAL STORAGE CHƯA ===
    let storedKey = null;
    
    // Thử đọc từ sessionStorage trước (ưu tiên)
    try {
        storedKey = sessionStorage.getItem('phongtus_key');
        if (!storedKey) {
            storedKey = localStorage.getItem('phongtus_key');
        }
    } catch(e) {}
    
    function generateRandomKey() {
        let randomPart = "";
        for (let i = 0; i < RANDOM_LEN; i++) {
            randomPart += CHARS.charAt(Math.floor(Math.random() * CHARS.length));
        }
        return PREFIX + randomPart;
    }
    
    // Load danh sách key đã dùng (từ localStorage)
    function loadUsedKeys() {
        try {
            const raw = localStorage.getItem("phongtus_used_keys");
            return raw ? JSON.parse(raw) : [];
        } catch(e) {
            return [];
        }
    }
    
    function saveUsedKeys(keys) {
        try {
            localStorage.setItem("phongtus_used_keys", JSON.stringify(keys));
        } catch(e) {}
    }
    
    function isKeyUsed(key) {
        const used = loadUsedKeys();
        return used.includes(key);
    }
    
    function markKeyAsUsed(key) {
        if (!key) return;
        const used = loadUsedKeys();
        if (!used.includes(key)) {
            used.push(key);
            saveUsedKeys(used);
        }
    }
    
    // Tạo key mới (chỉ dùng khi chưa có key)
    function generateNewKey() {
        let newKey;
        let attempts = 0;
        do {
            newKey = generateRandomKey();
            attempts++;
            if (attempts > 100) break;
        } while (isKeyUsed(newKey));
        
        markKeyAsUsed(newKey);
        return newKey;
    }
    
    // === XỬ LÝ KEY: CHỈ TẠO 1 LẦN DUY NHẤT ===
    let finalKey;
    
    if (storedKey && storedKey.startsWith(PREFIX) && storedKey.length === (PREFIX.length + RANDOM_LEN)) {
        // Đã có key từ trước, GIỮ NGUYÊN
        finalKey = storedKey;
    } else {
        // Chưa có key → TẠO MỚI 1 LẦN DUY NHẤT
        finalKey = generateNewKey();
        
        // Lưu vào cả sessionStorage và localStorage để chống F5
        try {
            sessionStorage.setItem('phongtus_key', finalKey);
            localStorage.setItem('phongtus_key', finalKey);
        } catch(e) {}
    }
    
    // Cập nhật URL parameter mà KHÔNG reload (chỉ hiển thị)
    try {
        const url = new URL(window.location.href);
        if (url.searchParams.get('ma') !== finalKey) {
            url.searchParams.set('ma', finalKey);
            window.history.replaceState({}, '', url);
        }
    } catch(e) {}
    
    // === HIỂN THỊ KEY ===
    const keyInput = document.getElementById('keyInput');
    if (keyInput) {
        keyInput.value = finalKey;
    }
    
    // === CHẶN F5, CHẶN RELOAD, CHẶN SPAM KEY ===
    // Cảnh báo khi reload
    window.addEventListener('beforeunload', function(e) {
        // Không cho reload nếu đã có key (tùy chọn)
        // Chỉ hiển thị cảnh báo
        if (finalKey) {
            e.preventDefault();
            e.returnValue = 'Key đã được tạo! Reload sẽ không tạo key mới. Bạn có chắc muốn reload?';
            return e.returnValue;
        }
    });
    
    // Chặn F5 và Ctrl+R, Ctrl+Shift+R, Ctrl+F5
    document.addEventListener('keydown', function(e) {
        if (e.key === 'F5' || 
            (e.ctrlKey && e.key === 'r') || 
            (e.ctrlKey && e.shiftKey && e.key === 'R') ||
            (e.ctrlKey && e.key === 'F5')) {
            e.preventDefault();
            // Hiển thị thông báo đẹp
            showToast('⚠️ KHÔNG THỂ TẠO KEY MỚI! Key đã được tạo 1 lần duy nhất.', 'warning');
            return false;
        }
    });
    
    // Toast notification
    function showToast(message, type = 'info') {
        const toast = document.createElement('div');
        toast.textContent = message;
        toast.style.position = 'fixed';
        toast.style.bottom = '20px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.padding = '12px 24px';
        toast.style.background = type === 'warning' ? 'rgba(255, 0, 0, 0.9)' : 'rgba(0, 255, 255, 0.9)';
        toast.style.color = '#000';
        toast.style.fontWeight = 'bold';
        toast.style.borderRadius = '8px';
        toast.style.fontFamily = 'monospace';
        toast.style.zIndex = '9999';
        toast.style.backdropFilter = 'blur(5px)';
        toast.style.border = '1px solid #fff';
        toast.style.fontSize = '14px';
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.5s';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }
    
    // === COPY KEY + TỰ ĐỘNG PLAY NHẠC ===
    let musicPlayed = false;
    let ytPlayer = null;
    let ytReady = false;
    let isPlaying = false;
    
    const YT_VIDEO_ID = 'UKox4YEvLpg';
    
    function initYouTube() {
        if (typeof YT !== 'undefined' && YT.loaded) {
            createPlayer();
            return;
        }
        if (!document.getElementById('yt-api-script')) {
            const tag = document.createElement('script');
            tag.id = 'yt-api-script';
            tag.src = 'https://www.youtube.com/iframe_api';
            document.head.appendChild(tag);
        }
        window.onYouTubeIframeAPIReady = function() {
            createPlayer();
        };
    }
    
    function createPlayer() {
        if (ytPlayer) return;
        ytPlayer = new YT.Player('player', {
            height: '0',
            width: '0',
            videoId: YT_VIDEO_ID,
            playerVars: {
                autoplay: 0,
                controls: 0,
                modestbranding: 1,
                playsinline: 1
            },
            events: {
                onReady: function() {
                    ytReady = true;
                    try { ytPlayer.setVolume(50); } catch(e) {}
                },
                onStateChange: function(event) {
                    if (event.data === 1) {
                        isPlaying = true;
                        const musicBtn = document.getElementById('musicButton');
                        if (musicBtn) {
                            musicBtn.innerHTML = '⏸️ PAUSE MUSIC';
                            musicBtn.classList.add('music-playing');
                        }
                    } else if (event.data === 2) {
                        isPlaying = false;
                        const musicBtn = document.getElementById('musicButton');
                        if (musicBtn) {
                            musicBtn.innerHTML = '🎵 PLAY MUSIC';
                            musicBtn.classList.remove('music-playing');
                        }
                    }
                }
            }
        });
    }
    
    function playMusic() {
        if (!ytReady && !ytPlayer) {
            initYouTube();
            // Chờ một chút rồi thử lại
            setTimeout(() => {
                if (ytReady && ytPlayer) {
                    try {
                        ytPlayer.playVideo();
                        isPlaying = true;
                    } catch(e) {}
                }
            }, 1000);
        } else if (ytPlayer && ytReady) {
            try {
                ytPlayer.playVideo();
                isPlaying = true;
            } catch(e) {}
        }
    }
    
    function pauseMusic() {
        if (ytPlayer && ytReady) {
            try {
                ytPlayer.pauseVideo();
                isPlaying = false;
            } catch(e) {}
        }
    }
    
    function toggleMusic() {
        if (!ytReady && !ytPlayer) {
            initYouTube();
            setTimeout(() => playMusic(), 500);
        } else if (isPlaying) {
            pauseMusic();
        } else {
            playMusic();
        }
    }
    
    // Copy key function
    async function copyKey() {
        if (!finalKey) return;
        
        // Hiệu ứng button
        const copyBtn = document.getElementById('copyButton');
        copyBtn.classList.add('copy-animation');
        setTimeout(() => copyBtn.classList.remove('copy-animation'), 500);
        
        // Copy text
        try {
            await navigator.clipboard.writeText(finalKey);
            showToast('✅ ĐÃ COPY KEY! ' + finalKey, 'success');
        } catch(e) {
            // Fallback
            const textarea = document.createElement('textarea');
            textarea.value = finalKey;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('✅ ĐÃ COPY KEY! ' + finalKey, 'success');
        }
        
        // === TỰ ĐỘNG PLAY NHẠC KHI COPY ===
        if (!musicPlayed) {
            musicPlayed = true;
            playMusic();
            // Cập nhật UI music button
            const musicBtn = document.getElementById('musicButton');
            if (musicBtn) {
                musicBtn.innerHTML = '⏸️ PAUSE MUSIC';
                musicBtn.classList.add('music-playing');
            }
            showToast('🎵 ĐANG PHÁT NHẠC NỀN!', 'info');
        } else if (!isPlaying) {
            playMusic();
        }
    }
    
    // === WIRE BUTTONS ===
    const copyBtn = document.getElementById('copyButton');
    if (copyBtn) {
        copyBtn.addEventListener('click', copyKey);
    }
    
    const musicBtn = document.getElementById('musicButton');
    if (musicBtn) {
        musicBtn.addEventListener('click', toggleMusic);
    }
    
    // === TIME DISPLAY ===
    function updateTime() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        const ss = String(now.getSeconds()).padStart(2, '0');
        const d = now.getDate();
        const m = now.getMonth() + 1;
        const y = now.getFullYear();
        
        const clockSpan = document.getElementById('clock');
        if (clockSpan) clockSpan.textContent = `${hh}:${mm}:${ss}`;
        
        const dateDiv = document.getElementById('dateDisplay');
        if (dateDiv) dateDiv.innerHTML = `└─[ ${d}/${m}/${y} | ${hh}:${mm}:${ss} ]─┘`;
        
        document.title = `PHONG-TUS | ${finalKey.slice(-8)}`;
        
        setTimeout(updateTime, 1000);
    }
    
    // Khởi tạo YouTube khi load trang (để sẵn sàng)
    window.addEventListener('load', function() {
        updateTime();
        initYouTube();
        
        // Log để debug (chỉ hiển thị trong console)
        console.log('🔐 PHONG-TUS KEY SYSTEM ACTIVE');
        console.log('📌 KEY:', finalKey);
        console.log('⚠️ F5/RELOAD đã bị chặn! Key chỉ tạo 1 lần.');
    });
    
    // Xóa các nút random key nếu có (đề phòng)
    const randomButtons = document.querySelectorAll('[onclick*="random"], [onclick*="generate"]');
    randomButtons.forEach(btn => btn.remove());
    
})();
</script>
</body>
</html>
