<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
    <title>PHONG-TUS | KEY GENERATOR</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', 'Courier New', monospace;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }
        
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        
        .cyber-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #050508);
            z-index: 0;
        }
        
        .cyber-bg::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
        }
        
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
            background-repeat: repeat;
            opacity: 0.08;
            pointer-events: none;
            z-index: 2;
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 255, 255, 0.02) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            animation: scanMove 8s linear infinite;
        }
        
        @keyframes scanMove {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }
        
        .cyber-container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }
        
        .cyber-card {
            background: rgba(8, 8, 16, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 32px 28px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
            transition: all 0.4s ease;
        }
        
        .cyber-card:hover {
            border-color: rgba(0, 255, 255, 0.7);
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.2);
        }
        
        .glitch-text {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #8a2be2, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: 3px;
            animation: flicker 3s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            95% { opacity: 0.3; }
            96% { opacity: 0.8; }
            97% { opacity: 0.2; }
            98% { opacity: 0.9; }
            99% { opacity: 0.4; }
        }
        
        .subtitle {
            text-align: center;
            font-size: 11px;
            color: #00ffff;
            opacity: 0.6;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        
        .key-card {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            padding: 20px;
            margin: 24px 0;
            border: 1px solid rgba(0, 255, 255, 0.2);
        }
        
        .key-label {
            font-size: 10px;
            color: #8a2be2;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        
        .key-value {
            width: 100%;
            padding: 14px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #00ffff;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            letter-spacing: 1px;
            animation: borderPulse 2s infinite;
        }
        
        @keyframes borderPulse {
            0%, 100% { border-color: rgba(0, 255, 255, 0.5); box-shadow: 0 0 5px rgba(0, 255, 255, 0.2); }
            50% { border-color: rgba(0, 255, 255, 0.9); box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }
        }
        
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 6px 16px;
            background: rgba(0, 255, 255, 0.08);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 30px;
            font-size: 10px;
            color: #00ffff;
        }
        
        .status-dot {
            width: 6px;
            height: 6px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulseDot 1.5s infinite;
        }
        
        @keyframes pulseDot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .button-group {
            display: flex;
            gap: 16px;
            margin: 24px 0 20px;
        }
        
        .cyber-btn {
            flex: 1;
            padding: 14px 20px;
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(138, 43, 226, 0.15));
            border: 1px solid rgba(0, 255, 255, 0.4);
            border-radius: 12px;
            color: #00ffff;
            font-family: 'Orbitron', monospace;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .cyber-btn:hover {
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-copy {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.25), rgba(0, 150, 200, 0.25));
        }
        
        @keyframes copyFlash {
            0% { transform: scale(1); }
            50% { transform: scale(0.98); background: #00ff00; box-shadow: 0 0 30px #00ff00; }
            100% { transform: scale(1); }
        }
        
        .copy-flash {
            animation: copyFlash 0.4s ease;
        }
        
        .info-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 16px;
            margin-top: 20px;
            border-left: 3px solid #00ffff;
        }
        
        .info-line {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            padding: 5px 0;
        }
        
        .info-label {
            color: #8a2be2;
        }
        
        .info-value {
            color: #00ffff;
        }
        
        .cyber-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 9px;
            color: rgba(0, 255, 255, 0.3);
        }
        
        .cyber-footer a {
            color: rgba(0, 255, 255, 0.5);
            text-decoration: none;
        }
        
        .cyber-footer a:hover {
            color: #00ffff;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            background: rgba(0, 255, 255, 0.9);
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            font-family: monospace;
            z-index: 9999;
            font-size: 12px;
            animation: fadeOut 2.5s forwards;
        }
        
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        
        .toast-warning {
            background: rgba(255, 0, 0, 0.9);
        }
        
        /* Reload block overlay */
        .reload-blocker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        .reload-blocker.hidden {
            display: none;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .reload-message {
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            font-family: 'Orbitron', monospace;
            text-shadow: 0 0 10px #ff0000;
            animation: blink 0.5s infinite;
        }
        
        .reload-sub {
            color: #00ffff;
            font-size: 14px;
            text-align: center;
        }
        
        #player {
            display: none;
        }
        
        @media (max-width: 550px) {
            .cyber-card { padding: 24px 18px; }
            .glitch-text { font-size: 24px; }
            .key-value { font-size: 11px; }
            .cyber-btn { font-size: 11px; padding: 12px; }
            .reload-message { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="noise-overlay"></div>
    <div class="scanline"></div>
    <div id="player"></div>
    
    <!-- Reload Blocker -->
    <div id="reloadBlocker" class="reload-blocker hidden">
        <div class="reload-message">⛔ ACCESS DENIED ⛔</div>
        <div class="reload-sub">RELOAD IS NOT ALLOWED</div>
        <div class="reload-sub">Key đã được tạo, vui lòng COPY và sử dụng</div>
    </div>
    
    <div class="cyber-container">
        <div class="cyber-card">
            <div class="glitch-text" data-text="PHONG-TUS">PHONG-TUS</div>
            <div class="subtitle">[ KEY DISTRIBUTION SYSTEM ]</div>
            
            <div class="key-card">
                <div class="key-label">┌─ ACCESS KEY ─┐</div>
                <input type="text" id="keyInput" class="key-value" readonly />
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span id="statusText">KEY GENERATED - DO NOT RELOAD</span>
                </div>
            </div>
            
            <div class="button-group">
                <button id="copyButton" class="cyber-btn btn-copy">📋 COPY KEY</button>
            </div>
            
            <div class="info-card">
                <div class="info-line">
                    <span class="info-label">[ STATUS ]</span>
                    <span class="info-value" id="sysStatus">ONLINE</span>
                </div>
                <div class="info-line">
                    <span class="info-label">[ TIMESTAMP ]</span>
                    <span class="info-value" id="timestamp">--:--:--</span>
                </div>
                <div class="info-line">
                    <span class="info-label">[ WARNING ]</span>
                    <span class="info-value">F5 / RELOAD BLOCKED</span>
                </div>
            </div>
            
            <div class="cyber-footer">
                <span>© PHONG-TUS SYSTEM</span> | 
                <a href="https://t.me/se_meo_bao_an" target="_blank">[ TELEGRAM ]</a>
            </div>
        </div>
    </div>
    
    <script>
    /* ===== PHONG-TUS KEY SYSTEM v6.0 =====
       - CHẶN HOÀN TOÀN F5 / RELOAD
       - MỖI LẦN VÀO LINK ĐỀU TẠO KEY MỚI
       - KHÔNG CHO PHÉP CHỈNH SỬA
    =========================================*/
    
    (function() {
        const PREFIX = "PHONG-TUS-";
        const RANDOM_LEN = 12;
        const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        
        // === CHẶN F5 TUYỆT ĐỐI ===
        let reloadAttempts = 0;
        const reloadBlocker = document.getElementById('reloadBlocker');
        
        function showReloadBlocker() {
            if (reloadBlocker) {
                reloadBlocker.classList.remove('hidden');
                // Tự động ẩn sau 3 giây
                setTimeout(() => {
                    reloadBlocker.classList.add('hidden');
                }, 3000);
            }
        }
        
        // Chặn tất cả các phím tắt reload
        document.addEventListener('keydown', function(e) {
            // F5
            if (e.key === 'F5') {
                e.preventDefault();
                e.stopPropagation();
                showReloadBlocker();
                showToast('⛔ F5 BỊ CHẶN! Không thể reload trang', true);
                return false;
            }
            
            // Ctrl + R
            if (e.ctrlKey && e.key === 'r') {
                e.preventDefault();
                e.stopPropagation();
                showReloadBlocker();
                showToast('⛔ Ctrl+R BỊ CHẶN! Không thể reload trang', true);
                return false;
            }
            
            // Ctrl + Shift + R
            if (e.ctrlKey && e.shiftKey && e.key === 'R') {
                e.preventDefault();
                e.stopPropagation();
                showReloadBlocker();
                showToast('⛔ Hard Reload BỊ CHẶN!', true);
                return false;
            }
            
            // Ctrl + F5
            if (e.ctrlKey && e.key === 'F5') {
                e.preventDefault();
                e.stopPropagation();
                showReloadBlocker();
                showToast('⛔ Ctrl+F5 BỊ CHẶN!', true);
                return false;
            }
            
            // Cmd + R (Mac)
            if (e.metaKey && e.key === 'r') {
                e.preventDefault();
                e.stopPropagation();
                showReloadBlocker();
                showToast('⛔ Cmd+R BỊ CHẶN! Không thể reload trang', true);
                return false;
            }
        });
        
        // Chặn reload bằng chuột (right click -> reload)
        document.addEventListener('contextmenu', function(e) {
            // Cho phép right click nhưng không cho reload
            return true;
        });
        
        // Chặn beforeunload (cảnh báo khi cố gắng rời trang)
        window.addEventListener('beforeunload', function(e) {
            reloadAttempts++;
            if (reloadAttempts > 0) {
                e.preventDefault();
                e.returnValue = '⚠️ KHÔNG ĐƯỢC RELOAD! Key sẽ mất nếu reload. Bạn có chắc muốn rời trang?';
                return e.returnValue;
            }
        });
        
        // Xử lý khi người dùng cố gắng dùng trình duyệt back/forward
        window.addEventListener('popstate', function(e) {
            // Khôi phục lại URL với key hiện tại
            try {
                const url = new URL(window.location.href);
                if (url.searchParams.get('ma') !== finalKey) {
                    url.searchParams.set('ma', finalKey);
                    window.history.replaceState({}, '', url);
                }
            } catch(e) {}
            showToast('⚠️ Navigation bị giới hạn', true);
        });
        
        // === XÓA TẤT CẢ KEY CŨ TRONG STORAGE ===
        try {
            sessionStorage.removeItem('phongtus_key');
            localStorage.removeItem('phongtus_key');
            sessionStorage.removeItem('phongtus_current_key');
            localStorage.removeItem('phongtus_used_keys');
        } catch(e) {}
        
        // === TẠO KEY NGẪU NHIÊN MỚI ===
        function generateRandomKey() {
            let randomPart = "";
            for (let i = 0; i < RANDOM_LEN; i++) {
                randomPart += CHARS.charAt(Math.floor(Math.random() * CHARS.length));
            }
            return PREFIX + randomPart;
        }
        
        // Tạo key mới
        let finalKey = generateRandomKey();
        
        // Lưu key tạm thời trong session (chỉ để tham khảo)
        try {
            sessionStorage.setItem('phongtus_current_key', finalKey);
        } catch(e) {}
        
        // Cập nhật URL parameter với key mới (KHÔNG RELOAD TRANG)
        try {
            const url = new URL(window.location.href);
            url.searchParams.set('ma', finalKey);
            window.history.replaceState({}, '', url);
        } catch(e) {}
        
        // Hiển thị key
        const keyInput = document.getElementById('keyInput');
        if (keyInput) {
            keyInput.value = finalKey;
        }
        
        // === TOAST NOTIFICATION ===
        function showToast(message, isWarning = false) {
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.className = 'toast';
            if (isWarning) {
                toast.classList.add('toast-warning');
                toast.style.background = 'rgba(255, 0, 0, 0.9)';
            } else {
                toast.style.background = 'rgba(0, 255, 255, 0.9)';
            }
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        // === COPY KEY ===
        async function copyKey() {
            if (!finalKey) return;
            
            const copyBtn = document.getElementById('copyButton');
            copyBtn.classList.add('copy-flash');
            setTimeout(() => copyBtn.classList.remove('copy-flash'), 400);
            
            try {
                await navigator.clipboard.writeText(finalKey);
                showToast('✓ KEY COPIED: ' + finalKey);
            } catch(e) {
                const textarea = document.createElement('textarea');
                textarea.value = finalKey;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast('✓ KEY COPIED: ' + finalKey);
            }
        }
        
        // === TIME DISPLAY ===
        function updateTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            
            const timestampSpan = document.getElementById('timestamp');
            if (timestampSpan) timestampSpan.textContent = `${hh}:${mm}:${ss}`;
            
            setTimeout(updateTime, 1000);
        }
        
        // === CHẶN CHỈNH SỬA INPUT ===
        if (keyInput) {
            keyInput.addEventListener('keydown', function(e) {
                e.preventDefault();
                return false;
            });
            
            keyInput.addEventListener('paste', function(e) {
                e.preventDefault();
                return false;
            });
            
            keyInput.addEventListener('copy', function(e) {
                // Cho phép copy
                e.clipboardData.setData('text/plain', finalKey);
                e.preventDefault();
            });
        }
        
        // === EVENT LISTENERS ===
        const copyBtn = document.getElementById('copyButton');
        if (copyBtn) copyBtn.addEventListener('click', copyKey);
        
        // === KHỞI TẠO ===
        window.addEventListener('load', function() {
            updateTime();
            
            console.log('🔐 PHONG-TUS KEY SYSTEM v6.0');
            console.log('📌 NEW KEY:', finalKey);
            console.log('⚠️ F5/RELOAD ĐÃ BỊ CHẶN HOÀN TOÀN');
            console.log('⚠️ Mỗi lần vào link đều tạo key MỚI');
        });
        
        // Hiển thị thông báo key mới
        setTimeout(() => {
            showToast('✨ NEW KEY GENERATED: ' + finalKey);
        }, 500);
        
    })();
    </script>
</body>
</html>
