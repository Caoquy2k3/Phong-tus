<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Key Ngày Hôm Nay Là</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .loading-container {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            background: rgba(255,255,255,0.95);
            width: 80vw;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }
        h1 { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px; 
            margin-bottom: 12px; 
        }
        .key-label { font-size: 14px; color: #888; margin-bottom: 5px; }
        .key-container { display:flex; flex-direction:column; align-items:center; }
        input {
            text-align:center; width:90%; padding:15px; margin-bottom:15px;
            border:2px solid #667eea; border-radius:12px; font-size:16px;
            background:#f8f8f8; font-weight:bold; font-family: monospace;
            letter-spacing: 1px;
        }
        .button-group { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color:#fff; padding:12px 24px; border:none;
            border-radius:10px; cursor:pointer; font-size:15px; 
            min-width:140px; transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }
        button:active { transform: translateY(0); }
        .footer { text-align:center; margin-top:20px; color:#555; font-size:14px; }
        .footer a { color:#667eea; text-decoration:none; font-weight:bold; }
        #player { display:none; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            animation: fadeInOut 2s ease-in-out;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        .music-note {
            display: inline-block;
            animation: bounce 0.5s ease infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div id="player"></div>

    <div class="loading-container">
        <h1>🔑 KEY CỦA BẠN LÀ</h1>
        <div class="key-label">(Key tự động tạo - Copy để nhận key và nghe nhạc)</div>

        <div class="key-container">
            <input type="text" id="keyInput" readonly />
            <div class="button-group">
                <button id="copyButton">📋 Copy Key & Nghe Nhạc</button>
                <button id="musicButton">🎵 Play/Pause</button>
            </div>
        </div>

        <div id="dateDisplay" style="margin-top:10px; font-size:18px; color:#555;"></div>
        <div class="footer">
            <b>Copyright By
                <a href="https://zalo.me/0822771058" target="_blank">Nguyễn Duy Khánh</a>
                | Time: <span id="clock"></span>
            </b>
        </div>
    </div>

<script>
/* ==== KEY GEN VỚI HMAC SIGNATURE (ĐỒNG BỘ VỚI TOOL PYTHON) ==== */
(function(){
  const PREFIX = "PHONG-TUS-";
  const RANDOM_LEN = 32; // 32 ký tự random
  const CHARS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const HMAC_SECRET = "phong_tus_hmac_secret_2024"; // PHẢI GIỐNG TOOL PYTHON

  // Hàm tạo HMAC signature (dùng Web Crypto API)
  async function generateHMACSignature(message) {
    const encoder = new TextEncoder();
    const keyData = encoder.encode(HMAC_SECRET);
    const messageData = encoder.encode(message);
    
    const cryptoKey = await crypto.subtle.importKey(
        'raw', keyData, { name: 'HMAC', hash: 'MD5' }, false, ['sign']
    );
    
    // MD5 không có sẵn trong Web Crypto, dùng SHA-256 rồi lấy 6 ký tự đầu
    // Hoặc dùng thư viện bên ngoài, nhưng để đơn giản dùng SHA-256
    const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
    const hashArray = Array.from(new Uint8Array(signature));
    const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    return hashHex.substring(0, 6).toUpperCase();
  }

  function generateRandomString(len) {
    let result = "";
    for (let i = 0; i < len; i++) {
      result += CHARS.charAt(Math.floor(Math.random() * CHARS.length));
    }
    return result;
  }

  async function generateKeyWithSignature() {
    const randomPart = generateRandomString(RANDOM_LEN);
    const signature = await generateHMACSignature(randomPart);
    return PREFIX + randomPart + signature;
  }

  function _loadUsed() {
    try {
      const raw = localStorage.getItem("usedKeys");
      const arr = raw ? JSON.parse(raw) : [];
      return Array.isArray(arr) ? arr : [];
    } catch (e) {
      return [];
    }
  }

  function _saveUsed(arr) {
    try {
      localStorage.setItem("usedKeys", JSON.stringify(arr));
    } catch (e) {}
  }

  function markKeyAsUsed(key) {
    if (!key) return;
    const used = _loadUsed();
    if (!used.includes(key)) {
      used.push(key);
      _saveUsed(used);
    }
  }

  function isKeyUsed(key) {
    if (!key) return false;
    return _loadUsed().includes(key);
  }

  async function generateUniqueKey(maxAttempts = 10) {
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      const k = await generateKeyWithSignature();
      if (!isKeyUsed(k)) {
        markKeyAsUsed(k);
        return k;
      }
    }
    const fallback = await generateKeyWithSignature();
    markKeyAsUsed(fallback);
    return fallback;
  }

  // Hiển thị key
  const keyInput = document.getElementById('keyInput');
  let currentKey = null;

  async function initKey() {
    // Kiểm tra URL param ?ma
    const urlParams = new URLSearchParams(window.location.search);
    let keyFromUrl = urlParams.get('ma');
    
    if (keyFromUrl && keyFromUrl.startsWith(PREFIX) && keyFromUrl.length > 20) {
      currentKey = keyFromUrl;
      keyInput.value = currentKey;
    } else {
      currentKey = await generateUniqueKey();
      keyInput.value = currentKey;
      // Update URL
      try {
        const newUrl = window.location.origin + window.location.pathname + "?ma=" + encodeURIComponent(currentKey);
        history.replaceState({}, "", newUrl);
      } catch(e) {}
    }
  }

  // Copy + phát nhạc
  async function copyKeyAndPlayMusic() {
    if (!currentKey) return;
    
    // Copy key
    try {
      await navigator.clipboard.writeText(currentKey);
      showToast("✅ Đã copy key: " + currentKey.substring(0, 20) + "...");
      
      // Phát nhạc ngay khi copy
      if (typeof playMusicOnCopy === 'function') {
        playMusicOnCopy();
      } else {
        // Fallback: play via YT player
        if (typeof ytPlayer !== 'undefined' && ytPlayerReady) {
          ytPlayer.playVideo();
          musicButtonUpdateState(true);
          showToast("🎵 Đang phát nhạc nền!");
        }
      }
      
      // Đánh dấu đã dùng
      markKeyAsUsed(currentKey);
    } catch(err) {
      showToast("❌ Copy thất bại: " + err.message);
    }
  }

  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }

  // Copy button
  const copyBtn = document.getElementById('copyButton');
  if (copyBtn) {
    copyBtn.addEventListener('click', copyKeyAndPlayMusic);
  }

  // Khởi tạo key
  initKey();

  // Expose utilities
  window.__KEY_UTILS = { generateKeyWithSignature, markKeyAsUsed, currentKey: () => currentKey };
})();
</script>

<script>
/* ---------- YouTube Player với tự động phát khi copy ---------- */
let ytPlayer;
let ytPlayerReady = false;
let ytPlayerInitializing = false;
const YT_VIDEO_ID = 'UKox4YEvLpg'; // Video nhạc nền

function initYouTubePlayer() {
  if (ytPlayerInitializing || (typeof YT !== 'undefined' && ytPlayer)) return;
  ytPlayerInitializing = true;
  
  if (!document.getElementById('yt-iframe-api')) {
    const tag = document.createElement('script');
    tag.id = 'yt-iframe-api';
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  }
}

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('player', {
    height: '0',
    width: '0',
    videoId: YT_VIDEO_ID,
    playerVars: {
      autoplay: 0,
      controls: 0,
      rel: 0,
      modestbranding: 1,
      playsinline: 1
    },
    events: {
      'onReady': function(e) {
        ytPlayerReady = true;
        ytPlayerInitializing = false;
        try { ytPlayer.setVolume(70); } catch(e) {}
      },
      'onStateChange': function(event) {
        if (event.data === 0) {
          musicButtonUpdateState(false);
        } else if (event.data === 1) {
          musicButtonUpdateState(true);
        }
      }
    }
  });
}

// Hàm phát nhạc khi copy
function playMusicOnCopy() {
  if (typeof ytPlayer !== 'undefined' && ytPlayerReady) {
    ytPlayer.playVideo();
    showToast("🎵 Nhạc nền đang phát! Chúc bạn may mắn!");
  } else {
    initYouTubePlayer();
    // Đợi player ready rồi phát
    let checkInterval = setInterval(() => {
      if (ytPlayerReady) {
        ytPlayer.playVideo();
        clearInterval(checkInterval);
        showToast("🎵 Nhạc nền đang phát!");
      }
    }, 500);
    setTimeout(() => clearInterval(checkInterval), 10000);
  }
}

function toggleMusic() {
  if (typeof ytPlayer !== 'undefined' && ytPlayerReady) {
    const state = ytPlayer.getPlayerState();
    if (state === 1) {
      ytPlayer.pauseVideo();
      musicButtonUpdateState(false);
      showToast("⏸️ Đã tạm dừng nhạc");
    } else {
      ytPlayer.playVideo();
      musicButtonUpdateState(true);
      showToast("▶️ Tiếp tục phát nhạc");
    }
  } else {
    initYouTubePlayer();
    showToast("⏳ Đang tải nhạc, thử lại sau 2 giây...");
    setTimeout(() => toggleMusic(), 2000);
  }
}

function musicButtonUpdateState(isPlaying) {
  const musicBtn = document.getElementById('musicButton');
  if (musicBtn) {
    musicBtn.innerHTML = isPlaying ? '⏸️ Pause Music' : '🎵 Play Music';
  }
}

function showToast(message) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

/* ---------- Time display ---------- */
function updateTime() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const d = now.getDate(), m = now.getMonth()+1, y = now.getFullYear();
  document.getElementById('clock').textContent = `${hh}:${mm}:${ss}`;
  document.getElementById('dateDisplay').textContent = `📅 Hôm nay là ngày ${d}/${m}/${y}`;
  document.title = `Key Ngày ${d}/${m}/${y}`;
  setTimeout(updateTime, 1000);
}

/* ---------- Khởi tạo ---------- */
window.addEventListener('load', function() {
  updateTime();
  initYouTubePlayer(); // Khởi tạo sẵn player
});

// Music button
const musicBtn = document.getElementById('musicButton');
if (musicBtn) {
  musicBtn.addEventListener('click', toggleMusic);
}
</script>
</body>
</html>
